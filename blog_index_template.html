<!DOCTYPE html>
<html lang="en">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LH70R6RC4H"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-LH70R6RC4H');

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Lot7.ai | Home Inspection Resources</title>
  <meta name="description" content="Tips, guides, and resources for homebuyers and inspectors. Learn how to read inspection reports, understand repair costs, and make smarter decisions.">
  <link rel="canonical" href="https://lot7.ai/blog">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #14b8a6;
      --teal-dim: #0d9488;
      --teal-glow: rgba(20, 184, 166, 0.15);
      --dark: #080d0c;
      --dark-2: #0e1614;
      --dark-3: #141f1d;
      --dark-4: #1a2826;
      --text: #e2f0ee;
      --text-dim: #7a9e9a;
      --text-dimmer: #3d6460;
      --border: rgba(20, 184, 166, 0.12);
      --border-hover: rgba(20, 184, 166, 0.35);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 13, 12, 0.9);
      backdrop-filter: blur(20px);
    }

    .nav-logo {
      font-family: 'Figtree', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: var(--teal);
      letter-spacing: -0.5px;
      text-decoration: none;
    }

    .nav-logo span { color: var(--text-dim); }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--teal); }

    .nav-cta {
      background: var(--teal);
      color: var(--dark) !important;
      padding: 9px 22px;
      border-radius: 6px;
      font-weight: 500 !important;
    }

    .nav-cta:hover { background: var(--teal-dim) !important; }

    /* ── HERO ── */
    .blog-hero {
      padding: 140px 48px 64px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .blog-hero-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 16px;
    }

    .blog-hero h1 {
      font-family: 'Figtree', sans-serif;
      font-weight: 800;
      font-size: clamp(32px, 4vw, 52px);
      line-height: 1.1;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .blog-hero p {
      font-size: 17px;
      color: var(--text-dim);
      max-width: 560px;
    }

    /* ── POSTS GRID ── */
    .posts-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 48px 100px;
    }

    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .post-card {
      display: block;
      text-decoration: none;
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      transition: border-color 0.2s, transform 0.2s;
    }

    .post-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }

    .post-date {
      font-size: 12px;
      color: var(--text-dimmer);
      margin-bottom: 12px;
      font-weight: 400;
    }

    .post-card h2 {
      font-family: 'Figtree', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 12px;
      letter-spacing: -0.2px;
    }

    .post-card p {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .read-more {
      font-size: 13px;
      font-weight: 500;
      color: var(--teal);
    }

    .no-posts {
      color: var(--text-dim);
      font-size: 15px;
      padding: 48px 0;
    }

    @media (max-width: 640px) {
      nav { padding: 16px 20px; }
      .nav-links { display: none; }
      .blog-hero, .posts-section { padding-left: 20px; padding-right: 20px; }
      .blog-hero { padding-top: 100px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/">Lot7<span>.ai</span></a>
    <ul class="nav-links">
      <li><a href="/#how">How it works</a></li>
      <li><a href="/#features">Features</a></li>
      <li><a href="/#pricing">Pricing</a></li>
      <li><a href="/blog" class="active">Blog</a></li>
      <li><a href="/upload" class="nav-cta">Try it free →</a></li>
    </ul>
  </nav>

  <section class="blog-hero">
    <p class="blog-hero-label">Resources</p>
    <h1>Inspection intel,<br>plain English.</h1>
    <p>Guides and insights to help homebuyers understand inspection reports, repair costs, and what to do next.</p>
  </section>

  <section class="posts-section">
    <div class="posts-grid">
      {{POSTS}}
    </div>
  </section>

</body>
</html>
