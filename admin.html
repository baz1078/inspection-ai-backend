<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lot7 Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@700;800&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark-bg: #0b0f18; --card-bg: #141928; --surface: #1c2338; --surface2: #222840;
      --teal: #14b8a6; --teal-dim: rgba(20,184,166,0.12); --teal-glow: rgba(20,184,166,0.25);
      --pink: #d946a6; --amber: #f59e0b; --red: #f87171; --green: #34d399;
      --text: #f0f4ff; --text-muted: #6b7a99; --text-sub: #9aa3b8;
      --border: rgba(255,255,255,0.07); --border-focus: rgba(20,184,166,0.5);
    }
    body { font-family:'DM Sans',sans-serif; background:var(--dark-bg); color:var(--text); min-height:100vh; }
    .bg-grid { position:fixed; inset:0; z-index:0; background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px); background-size:48px 48px; pointer-events:none; }

    .header { position:relative; z-index:10; background:var(--card-bg); border-bottom:1px solid var(--border); padding:0 28px; display:flex; align-items:center; justify-content:space-between; height:56px; }
    .header-logo { font-family:'Figtree',sans-serif; font-size:20px; font-weight:800; background:linear-gradient(135deg,var(--teal),var(--pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .header-badge { font-family:'Syne',sans-serif; font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--amber); background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.3); padding:3px 8px; border-radius:4px; margin-left:10px; }
    .header-user { font-size:13px; color:var(--text-muted); display:flex; align-items:center; gap:12px; }
    .btn-logout { background:transparent; border:1px solid var(--border); color:var(--text-muted); font-size:12px; padding:5px 12px; border-radius:6px; cursor:pointer; transition:all .2s; }
    .btn-logout:hover { border-color:var(--red); color:var(--red); }

    .page { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:28px 24px; }

    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px; }
    .stat-card { background:var(--card-bg); border:1px solid var(--border); border-radius:14px; padding:18px 20px; position:relative; overflow:hidden; }
    .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--teal-glow),transparent); }
    .stat-label { font-size:11px; font-weight:500; letter-spacing:0.5px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
    .stat-value { font-family:'Syne',sans-serif; font-size:28px; font-weight:700; color:var(--text); }

    .tabs { display:flex; gap:0; border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:20px; width:fit-content; }
    .tab { padding:9px 24px; background:transparent; border:none; color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all .2s; }
    .tab.active { background:var(--teal); color:#0a0f1a; font-weight:700; }

    .search-row { display:flex; gap:10px; margin-bottom:16px; align-items:center; }
    .search-input { flex:1; max-width:360px; padding:9px 14px; background:var(--surface); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color .2s; }
    .search-input:focus { border-color:var(--border-focus); }
    .search-input::placeholder { color:var(--text-muted); }
    .count-label { font-size:13px; color:var(--text-muted); }

    .table-wrap { background:var(--card-bg); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    thead { background:var(--surface); }
    th { padding:11px 16px; text-align:left; font-size:11px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; color:var(--text-muted); white-space:nowrap; }
    td { padding:13px 16px; border-top:1px solid var(--border); font-size:13px; color:var(--text-sub); vertical-align:middle; }
    tr:hover td { background:rgba(255,255,255,0.02); }
    .td-main { color:var(--text); font-weight:500; }
    .td-mono { font-family:monospace; font-size:11px; color:var(--text-muted); }

    .badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; }
    .badge-active { background:rgba(52,211,153,0.12); color:var(--green); border:1px solid rgba(52,211,153,0.25); }
    .badge-inactive { background:rgba(107,122,153,0.12); color:var(--text-muted); border:1px solid var(--border); }
    .badge-paid { background:rgba(20,184,166,0.12); color:var(--teal); border:1px solid rgba(20,184,166,0.25); }
    .badge-unpaid { background:rgba(248,113,113,0.1); color:var(--red); border:1px solid rgba(248,113,113,0.2); }

    .btn-action { background:transparent; border:1px solid var(--border); color:var(--text-muted); font-size:11px; padding:4px 10px; border-radius:6px; cursor:pointer; transition:all .2s; white-space:nowrap; margin-right:4px; font-family:'DM Sans',sans-serif; }
    .btn-action:hover { border-color:var(--teal); color:var(--teal); }
    .btn-action.danger:hover { border-color:var(--red); color:var(--red); }
    .btn-action.success { border-color:rgba(52,211,153,0.4); color:var(--green); }
    .btn-action.success:hover { background:rgba(52,211,153,0.1); }

    .toast { position:fixed; bottom:24px; right:24px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 18px; font-size:13px; color:var(--text); z-index:1000; opacity:0; transform:translateY(8px); transition:all .25s; pointer-events:none; }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast.ok { border-color:rgba(52,211,153,0.4); color:var(--green); }
    .toast.err { border-color:rgba(248,113,113,0.4); color:var(--red); }

    .empty { text-align:center; padding:48px 20px; color:var(--text-muted); font-size:14px; }

    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:500; display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal-box { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:28px; max-width:400px; width:100%; }
    .modal-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; margin-bottom:16px; }
    .modal-field { margin-bottom:14px; }
    .modal-field label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-bottom:6px; }
    .modal-field input { width:100%; padding:9px 12px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; outline:none; font-family:'DM Sans',sans-serif; }
    .modal-field input:focus { border-color:var(--border-focus); }
    .modal-actions { display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }
    .btn-primary { background:var(--teal); color:#0a0f1a; border:none; padding:9px 20px; border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; font-family:'Syne',sans-serif; }
    .btn-secondary { background:transparent; color:var(--text-muted); border:1px solid var(--border); padding:9px 20px; border-radius:8px; font-size:13px; cursor:pointer; }

    @media(max-width:768px) { .stats-row{grid-template-columns:1fr 1fr;} }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="header">
    <div style="display:flex;align-items:center;">
      <span class="header-logo">LOT7</span>
      <span class="header-badge">Admin</span>
    </div>
    <div class="header-user">
      <span id="admin-email"></span>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="page">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value" id="stat-users">—</div></div>
      <div class="stat-card"><div class="stat-label">Active Subscribers</div><div class="stat-value" id="stat-subs">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Reports</div><div class="stat-value" id="stat-reports">—</div></div>
      <div class="stat-card"><div class="stat-label">Paid Reports</div><div class="stat-value" id="stat-paid">—</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('users')">Users</button>
      <button class="tab" onclick="switchTab('reports')">Reports</button>
    </div>

    <div id="tab-users">
      <div class="search-row">
        <input class="search-input" id="user-search" placeholder="Search by email…" oninput="filterUsers()">
        <span class="count-label" id="user-count"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Email</th><th>Joined</th><th>Subscription</th><th>Reports</th><th>Paid</th><th>Actions</th></tr></thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-reports" style="display:none;">
      <div class="search-row">
        <input class="search-input" id="report-search" placeholder="Search by address or email…" oninput="filterReports()">
        <span class="count-label" id="report-count"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Address</th><th>Customer Email</th><th>Date</th><th>Status</th><th>Linked User</th><th>Actions</th></tr></thead>
          <tbody id="reports-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="link-modal" style="display:none;">
    <div class="modal-box">
      <div class="modal-title">Link Report to User</div>
      <div class="modal-field">
        <label>Email or User ID</label>
        <input type="text" id="link-user-id" placeholder="user@email.com or paste user ID…">
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeLinkModal()">Cancel</button>
        <button class="btn-primary" onclick="submitLink()">Link</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let allUsers = [], allReports = [], linkingReportId = null;

    async function init() {
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        const data = await res.json();
        if (!data.authenticated) { window.location.href = '/login?next=/admin'; return; }
        document.getElementById('admin-email').textContent = data.user.email;
        await Promise.all([loadUsers(), loadReports()]);
        updateStats();
      } catch(e) { window.location.href = '/login?next=/admin'; }
    }

    async function loadUsers() {
      const res = await fetch('/api/admin/users', { credentials: 'include' });
      if (res.status === 403) { document.body.innerHTML = '<div style="padding:60px;text-align:center;color:#f87171;font-family:sans-serif;font-size:18px;">Access denied.</div>'; return; }
      allUsers = await res.json();
      renderUsers(allUsers);
    }

    async function loadReports() {
      const res = await fetch('/api/admin/reports', { credentials: 'include' });
      allReports = await res.json();
      renderReports(allReports);
    }

    function updateStats() {
      document.getElementById('stat-users').textContent = allUsers.length;
      document.getElementById('stat-subs').textContent = allUsers.filter(u => u.has_active_subscription).length;
      document.getElementById('stat-reports').textContent = allReports.length;
      document.getElementById('stat-paid').textContent = allReports.filter(r => r.is_paid).length;
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='users')||(i===1&&tab==='reports')));
      document.getElementById('tab-users').style.display = tab==='users' ? '' : 'none';
      document.getElementById('tab-reports').style.display = tab==='reports' ? '' : 'none';
    }

    function filterUsers() {
      const q = document.getElementById('user-search').value.toLowerCase();
      renderUsers(q ? allUsers.filter(u => u.email.toLowerCase().includes(q)) : allUsers);
    }

    function renderUsers(users) {
      document.getElementById('user-count').textContent = `${users.length} user${users.length!==1?'s':''}`;
      const tbody = document.getElementById('users-tbody');
      if (!users.length) { tbody.innerHTML = `<tr><td colspan="6"><div class="empty">No users found</div></td></tr>`; return; }
      tbody.innerHTML = users.map(u => `
        <tr>
          <td class="td-main">${esc(u.email)}</td>
          <td>${fmtDate(u.createdAt)}</td>
          <td><span class="badge ${u.has_active_subscription ? 'badge-active':'badge-inactive'}">${u.subscription_status||'inactive'}</span></td>
          <td>${u.report_count}</td>
          <td>${u.paid_count}</td>
          <td>
            ${u.has_active_subscription
              ? `<button class="btn-action danger" onclick="setSub('${u.id}','inactive')">Deactivate</button>`
              : `<button class="btn-action success" onclick="setSub('${u.id}','active')">Activate Sub</button>`}
            <button class="btn-action" onclick="copyText('${u.id}')">Copy ID</button>
            <button class="btn-action danger" onclick="deleteUser('${u.id}','${esc(u.email)}')">Delete</button>
          </td>
        </tr>`).join('');
    }

    function filterReports() {
      const q = document.getElementById('report-search').value.toLowerCase();
      renderReports(q ? allReports.filter(r => (r.address||'').toLowerCase().includes(q)||(r.customerEmail||'').toLowerCase().includes(q)) : allReports);
    }

    function renderReports(reports) {
      document.getElementById('report-count').textContent = `${reports.length} report${reports.length!==1?'s':''}`;
      const tbody = document.getElementById('reports-tbody');
      if (!reports.length) { tbody.innerHTML = `<tr><td colspan="6"><div class="empty">No reports found</div></td></tr>`; return; }
      tbody.innerHTML = reports.map(r => `
        <tr>
          <td class="td-main">${esc(r.address||'Unknown')}</td>
          <td>${esc(r.customerEmail||'—')}</td>
          <td>${fmtDate(r.createdAt)}</td>
          <td><span class="badge ${r.is_paid?'badge-paid':'badge-unpaid'}">${r.is_paid?'Paid':'Unpaid'}</span></td>
          <td class="td-mono">${r.user_id ? r.user_id.slice(0,8)+'…' : '<span style="color:var(--text-muted)">Orphan</span>'}</td>
          <td>
            ${!r.is_paid ? `<button class="btn-action success" onclick="markPaid('${r.id}')">Mark Paid</button>` : ''}
            <button class="btn-action" onclick="openLinkModal('${r.id}')">Link User</button>
            <button class="btn-action" onclick="window.open('/dashboard?report_id=${r.id}&paywall=off','_blank')">Open</button>
          </td>
        </tr>`).join('');
    }

    async function markPaid(id) {
      const res = await fetch(`/api/admin/mark-paid/${id}`, { method:'POST', credentials:'include' });
      if (res.ok) { allReports.find(r=>r.id===id).is_paid=true; filterReports(); updateStats(); toast('Marked as paid','ok'); }
      else toast('Failed','err');
    }

    async function setSub(userId, status) {
      const res = await fetch(`/api/admin/set-subscription/${userId}`, {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({status})
      });
      if (res.ok) {
        const u = allUsers.find(x=>x.id===userId);
        if (u) { u.subscription_status=status; u.has_active_subscription=status==='active'; }
        filterUsers(); updateStats(); toast(`Subscription set to ${status}`,'ok');
      } else toast('Failed','err');
    }

    async function deleteUser(userId, email) {
      if (!confirm(`Delete ${email}?\n\nReports will be unlinked but kept.`)) return;
      const res = await fetch(`/api/admin/delete-user/${userId}`, { method:'POST', credentials:'include' });
      if (res.ok) { allUsers=allUsers.filter(u=>u.id!==userId); filterUsers(); updateStats(); toast('User deleted','ok'); }
      else toast('Failed','err');
    }

    function openLinkModal(reportId) {
      linkingReportId = reportId;
      document.getElementById('link-user-id').value = '';
      document.getElementById('link-modal').style.display = 'flex';
    }
    function closeLinkModal() { linkingReportId=null; document.getElementById('link-modal').style.display='none'; }

    async function submitLink() {
      const userId = document.getElementById('link-user-id').value.trim();
      if (!userId) { toast('Enter a user ID','err'); return; }
      const res = await fetch(`/api/admin/link-report/${linkingReportId}`, {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({user_id: userId})
      });
      if (res.ok) {
        const r = allReports.find(x=>x.id===linkingReportId);
        if (r) r.user_id = userId;
        filterReports(); closeLinkModal(); toast('Report linked','ok');
      } else { const d=await res.json(); toast(d.error||'Failed','err'); }
    }

    async function logout() {
      await fetch('/api/auth/logout', { method:'POST', credentials:'include' });
      window.location.href = '/login';
    }

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function fmtDate(iso) { if (!iso) return '—'; return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
    function copyText(t) { navigator.clipboard.writeText(t).then(()=>toast('Copied','ok')); }

    let _tt;
    function toast(msg, type='ok') {
      const el = document.getElementById('toast');
      el.textContent=msg; el.className=`toast show ${type}`;
      clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'), 2800);
    }

    init();
  </script>
</body>
</html>
