name: Weekly SEO Autopublish

on:
  schedule:
    # Every Monday at 9:00 AM UTC (4am Chicago time)
    - cron: '0 9 * * 1'
  workflow_dispatch:
    # Manual trigger from GitHub Actions UI anytime

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic python-dotenv

      - name: Generate and publish next blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python seo/autopublish.py

      - name: Commit updated roadmap and new post
        run: |
          git config user.name "SEO Crew Bot"
          git config user.email "bot@lot7.ai"
          git add blog/ seo/keyword_roadmap.json
          git diff --staged --quiet || git commit -m "auto: weekly SEO post [$(date +%Y-%m-%d)]"
          git push
